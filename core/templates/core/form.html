{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-header">Форма</div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-success" type="submit">Сохранить</button>
      <a class="btn btn-secondary" href="javascript:history.back()">Назад</a>
    </form>
  </div>
</div>
{% endblock %}
