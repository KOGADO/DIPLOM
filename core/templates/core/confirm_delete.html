{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-body">
    <p>Удалить объект?</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Да, удалить</button>
      <a class="btn btn-secondary" href="javascript:history.back()">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
