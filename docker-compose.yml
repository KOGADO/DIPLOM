services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: performance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d performance_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    environment:
      DB_ENGINE: postgres
      POSTGRES_DB: performance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,web,*"
      LOAD_INITIAL_DATA: "1"
      INITIAL_DATA_PATH: /app/docker/seed/initial_data.json
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy

  db-seed:
    build: .
    profiles: ["tools"]
    environment:
      DB_ENGINE: postgres
      POSTGRES_DB: performance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      LOAD_INITIAL_DATA: "1"
      INITIAL_DATA_PATH: /app/docker/seed/initial_data.json
    command: ["python", "manage.py", "check"]
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
